<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Vishwanath Rajendran</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>

  <!-- Lucide Icons (with defer) -->
  <script src="https://unpkg.com/lucide@latest" defer></script>

  <!-- Load Theme from localStorage -->
  <script>
    if (
      localStorage.getItem('theme') === 'dark' ||
      (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>

<body class="bg-white text-black dark:bg-gray-900 dark:text-white transition-colors duration-300">

<!-- Navbar -->
  <nav class="bg-white dark:bg-gray-900 fixed w-full z-50 top-0">
    <div class="max-w-7xl mx-auto px-16 py-8 flex justify-between items-center">
    <div></div>
    <div class="flex gap-6 items-center text-sm sm:text-base font-semibold">
      <a href="{{ url_for('portfolio') }}" class="hover:text-yellow-500 dark:hover:text-blue-400">Home</a>
      <a href="{{ url_for('projects') }}" class="hover:text-yellow-500 dark:hover:text-blue-400">Projects</a>
      <a href="{{ url_for('education') }}" class="hover:text-yellow-500 dark:hover:text-blue-400">Education</a>
      <a href="{{ url_for('about') }}" class="hover:text-yellow-500 dark:hover:text-blue-400">About</a>
      <a href="{{ url_for('contact') }}" class="hover:text-yellow-500 dark:hover:text-blue-400">Contact</a>
      <button id="theme-toggle" class="text-xl">🌙</button>
    </div>
  </div>
</nav>

<!-- Contact Section -->
<section id="contact" class="pt-32 pb-20 bg-white dark:bg-gray-900 transition-colors duration-300">
  <div class="max-w-3xl mx-auto px-6 bg-gray-100 dark:bg-gray-800 p-10 rounded-2xl shadow-2xl">
    <h2 class="text-4xl font-bold text-center mb-8">Let's Connect</h2>

    <!-- Contact Form -->
    <form action="/submit" method="POST" class="space-y-6">
      <div>
        <label for="name" class="block font-semibold">Full Name:</label>
        <input type="text" id="name" name="name" required
          class="w-full px-4 py-3 mt-1 bg-gray-200 dark:bg-gray-100 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label for="email" class="block font-semibold">Email:</label>
        <input type="email" id="email" name="email" required
          class="w-full px-4 py-3 mt-1 bg-gray-200 dark:bg-gray-100 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label for="phone" class="block font-semibold">Phone Number <span class="text-sm text-gray-500">(optional)</span>:</label>
        <input type="tel" id="phone" name="phone"
          class="w-full px-4 py-3 mt-1 bg-gray-200 dark:bg-gray-100 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="+91-XXXXXXXXXX" />
      </div>

      <div>
        <label for="message" class="block font-semibold">Message:</label>
        <textarea id="message" name="message" rows="5" required
          class="w-full px-4 py-3 mt-1 bg-gray-200 dark:bg-gray-100 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Write your message here..."></textarea>
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 transition-all duration-300 py-3 rounded-full font-semibold text-white">
        Send Message
      </button>
    </form>

    <!-- Social Links -->
    <div class="text-center mt-10">
      <p class="mb-4">You can also reach me via:</p>
      <div class="flex justify-center gap-6 text-2xl">
        <a href="mailto:vishwanathamrish@gmail.com" class="text-red-500 hover:text-red-700" aria-label="Email">
          <i data-lucide="mail" class="w-6 h-6 stroke-current"></i>
        </a>
        <a href="https://linkedin.com/in/vishwanath-r-4a940721b" class="text-blue-600 hover:text-blue-800" target="_blank" aria-label="LinkedIn">
          <i data-lucide="linkedin" class="w-6 h-6 stroke-current"></i>
        </a>
        <a href="https://github.com/Vishwanathamrish" class="text-gray-800 hover:text-black dark:text-white dark:hover:text-gray-300" target="_blank" aria-label="GitHub">
          <i data-lucide="github" class="w-6 h-6 stroke-current"></i>
        </a>
        <a href="https://x.com/Vishwa84829045" target="_blank" class="text-black hover:text-gray-800 dark:text-white">
          <i data-lucide="twitter" class="w-6 h-6 stroke-current"></i>
        </a>
      </div>
    </div>
  </div>
</section>

 <footer class="mt-16 text-center text-gray-500 dark:text-gray-400 text-sm">
    © 2025 Vishwanath Rajendran
  </footer>
  <!-- Spacer after footer -->
<div class="h-16"></div>


<!-- Theme Toggle & Lucide Init -->
<script>
  const toggle = document.getElementById('theme-toggle');

  function setTheme(theme) {
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
      toggle.textContent = '☀️';
    } else {
      document.documentElement.classList.remove('dark');
      toggle.textContent = '🌙';
    }
    localStorage.setItem('theme', theme);
  }

  toggle.addEventListener('click', () => {
    const isDark = document.documentElement.classList.contains('dark');
    setTheme(isDark ? 'light' : 'dark');
  });

  window.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = savedTheme || (prefersDark ? 'dark' : 'light');
    setTheme(initialTheme);
  });

  // Ensure Lucide icons are rendered after loading
  window.addEventListener('load', () => {
    if (window.lucide) {
      lucide.createIcons();
    } else {
      console.error("Lucide failed to load.");
    }
  });
</script>

</body>
</html>
